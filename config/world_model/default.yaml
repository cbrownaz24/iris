_target_: models.TransformerConfig
tokens_per_block: 17
max_blocks: 20
attention: 'causal'

# Mini transformer encoder (within-block spatial attention over 16 obs tokens)
num_layers: 2
num_heads: 4
embed_dim: 256

# STU backbone (across-block temporal modeling)
# MLP_in: (stu_obs_dim + num_actions) -> stu_dim    [Koopman lift]
# STU:    stu_dim -> stu_dim
# MLP_out: stu_dim -> temporal_state_dim             [Koopman project]
stu_obs_dim: 256
stu_dim: 404
temporal_state_dim: 256
num_stu_layers: 1
num_filters: 16

# Cross-attention decoder (z_t tokens attend to temporal_state)
num_decoder_layers: 2
num_decoder_heads: 4
num_context_tokens: 4

# Dropout
embed_pdrop: 0.1
resid_pdrop: 0.1
attn_pdrop: 0.1
