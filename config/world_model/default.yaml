_target_: models.TransformerConfig
tokens_per_block: 17
max_blocks: 20
attention: 'causal'

# Working dimension (codebook 512 projected to this)
embed_dim: 256

# Mini transformer encoder (within-block spatial attention, CLS output)
num_encoder_layers: 2
num_encoder_heads: 4
num_cls_tokens: 2

# STU backbone (across-block temporal modeling)
# MLP_in:  (num_cls * embed_dim + num_actions) -> stu_input_dim  [Koopman lift]
# STU:     M_k: stu_input_dim -> stu_output_dim
# MLP_out: stu_output_dim -> embed_dim                           [compress]
stu_input_dim: 656
stu_output_dim: 324
num_stu_layers: 1
num_filters: 16

# Decoder transformer (full self-attention, predicts next frame)
num_decoder_layers: 2
num_decoder_heads: 4

# Dropout
embed_pdrop: 0.1
resid_pdrop: 0.1
attn_pdrop: 0.1
